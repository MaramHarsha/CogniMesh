name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  foundation:
    name: Foundation validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate repository foundation
        run: python scripts/validate_foundation.py

  module-gates:
    name: Module gates (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: object-registry
            service: services/object-registry
            modules: "1 2 10"
          - name: ingestion-control
            service: services/ingestion-control
            modules: "4"
          - name: lakehouse-control
            service: services/lakehouse-control
            modules: "5"
          - name: compute-control
            service: services/compute-control
            modules: "6"
          - name: pipeline-control
            service: services/pipeline-control
            modules: "7"
          - name: semantic-control
            service: services/semantic-control
            modules: "8"
          - name: query-service
            service: services/query-service
            modules: "9"
          - name: quality-control
            service: services/quality-control
            modules: "11"
          - name: action-control
            service: services/action-control
            modules: "12"
          - name: app-control
            service: services/app-control
            modules: "13"
          - name: ml-control
            service: services/ml-control
            modules: "15"
          - name: planning-control
            service: services/planning-control
            modules: "16"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "${{ matrix.service }}[test]"

      - name: Run module validation gates
        run: |
          for module in ${{ matrix.modules }}; do
            python "scripts/validate_module${module}.py"
          done

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  console:
    name: Console build (Module 14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install console dependencies
        working-directory: apps/console
        run: npm ci

      - name: Build console
        working-directory: apps/console
        run: npm run build

      - name: Run module validation gate
        run: python scripts/validate_module14.py

  docker-template:
    name: Docker template build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Python service template
        run: docker build -t cognimesh-python-service-template services/_template/python_service

