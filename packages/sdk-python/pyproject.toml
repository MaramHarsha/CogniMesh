[project]
name = "cognimesh-sdk"
version = "0.1.0"
description = "CogniMesh Python SDK for Object Query Service and App Registry"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.27,<1.0",
]

[project.scripts]
cognimesh = "cognimesh.cli:main"


[project.optional-dependencies]
test = [
  "pytest>=8.0,<10.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
