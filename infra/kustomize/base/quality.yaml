apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quality-control-state
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: quality-control
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: quality-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognimesh
      app.kubernetes.io/component: quality-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognimesh
        app.kubernetes.io/component: quality-control
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: quality-control
          image: cognimesh/quality-control:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8070
          env:
            - name: COGNIMESH_ENV
              value: kubernetes
            - name: COGNIMESH_SERVICE_NAME
              value: cognimesh-quality-control
            - name: COGNIMESH_ALLOW_DEV_AUTH
              value: "false"
            - name: COGNIMESH_QUALITY_STATE_PATH
              value: /var/lib/cognimesh/quality-control/quality.db
            - name: COGNIMESH_OBJECT_REGISTRY_URL
              value: http://object-registry:8000
            - name: COGNIMESH_SEMANTIC_CONTROL_URL
              value: http://semantic-control:8050
            - name: COGNIMESH_COMPUTE_CONTROL_URL
              value: http://compute-control:8030
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: quality-state
              mountPath: /var/lib/cognimesh/quality-control
      volumes:
        - name: quality-state
          persistentVolumeClaim:
            claimName: quality-control-state
---
apiVersion: v1
kind: Service
metadata:
  name: quality-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: quality-control
spec:
  selector:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: quality-control
  ports:
    - name: http
      port: 8070
      targetPort: http
