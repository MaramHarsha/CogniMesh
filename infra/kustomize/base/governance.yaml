apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: governance-control-state
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: governance-control
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: governance-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognimesh
      app.kubernetes.io/component: governance-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognimesh
        app.kubernetes.io/component: governance-control
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: governance-control
          image: cognimesh/governance-control:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8120
          env:
            - name: COGNIMESH_ENV
              value: kubernetes
            - name: COGNIMESH_SERVICE_NAME
              value: cognimesh-governance-control
            - name: COGNIMESH_ALLOW_DEV_AUTH
              value: "false"
            - name: COGNIMESH_GOVERNANCE_STATE_PATH
              value: /var/lib/cognimesh/governance-control/governance.db
            - name: COGNIMESH_OBJECT_REGISTRY_URL
              value: http://object-registry:8000
            - name: COGNIMESH_QUERY_SERVICE_URL
              value: http://query-service:8060
            - name: COGNIMESH_LINEAGE_ENDPOINT_URL
              value: http://object-registry:8000/v1/lineage/openlineage
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: governance-state
              mountPath: /var/lib/cognimesh/governance-control
      volumes:
        - name: governance-state
          persistentVolumeClaim:
            claimName: governance-control-state
---
apiVersion: v1
kind: Service
metadata:
  name: governance-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: governance-control
spec:
  selector:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: governance-control
  ports:
    - name: http
      port: 8120
      targetPort: http
