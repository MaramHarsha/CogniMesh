apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semantic-control-state
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: semantic-control
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: semantic-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognimesh
      app.kubernetes.io/component: semantic-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognimesh
        app.kubernetes.io/component: semantic-control
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: semantic-control
          image: cognimesh/semantic-control:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8050
          env:
            - name: COGNIMESH_ENV
              value: kubernetes
            - name: COGNIMESH_SERVICE_NAME
              value: cognimesh-semantic-control
            - name: COGNIMESH_ALLOW_DEV_AUTH
              value: "false"
            - name: COGNIMESH_SEMANTIC_STATE_PATH
              value: /var/lib/cognimesh/semantic-control/semantic.db
            - name: COGNIMESH_OBJECT_REGISTRY_URL
              value: http://object-registry:8000
            - name: COGNIMESH_PIPELINE_CONTROL_URL
              value: http://pipeline-control:8040
            - name: COGNIMESH_COMPUTE_CONTROL_URL
              value: http://compute-control:8030
            - name: COGNIMESH_LINEAGE_ENDPOINT_URL
              value: http://object-registry:8000/v1/lineage/openlineage
            - name: COGNIMESH_DATAHUB_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: semantic-state
              mountPath: /var/lib/cognimesh/semantic-control
      volumes:
        - name: semantic-state
          persistentVolumeClaim:
            claimName: semantic-control-state
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: semantic-control
spec:
  selector:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: semantic-control
  ports:
    - name: http
      port: 8050
      targetPort: http
