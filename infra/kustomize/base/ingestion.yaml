apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ingestion-control-state
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: ingestion-control
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: ingestion-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognimesh
      app.kubernetes.io/component: ingestion-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognimesh
        app.kubernetes.io/component: ingestion-control
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: ingestion-control
          image: cognimesh/ingestion-control:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8020
          env:
            - name: COGNIMESH_ENV
              value: kubernetes
            - name: COGNIMESH_SERVICE_NAME
              value: cognimesh-ingestion-control
            - name: COGNIMESH_ALLOW_DEV_AUTH
              value: "false"
            - name: COGNIMESH_INGESTION_STATE_PATH
              value: /var/lib/cognimesh/ingestion-control/ingestion.db
            - name: COGNIMESH_INGESTION_LOCAL_ROOT
              value: /var/lib/cognimesh/ingestion-control/files
            - name: COGNIMESH_INGESTION_RAW_ROOT
              value: /var/lib/cognimesh/ingestion-control/raw
            - name: COGNIMESH_INGESTION_TARGET_FORMAT
              value: parquet
            - name: COGNIMESH_LAKEHOUSE_CONTROL_URL
              value: http://lakehouse-control:8010
            - name: COGNIMESH_OBJECT_REGISTRY_URL
              value: http://object-registry:8000
            - name: COGNIMESH_LINEAGE_ENDPOINT_URL
              value: http://object-registry:8000/v1/lineage/openlineage
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: ingestion-state
              mountPath: /var/lib/cognimesh/ingestion-control
      volumes:
        - name: ingestion-state
          persistentVolumeClaim:
            claimName: ingestion-control-state
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-control
  labels:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: ingestion-control
spec:
  selector:
    app.kubernetes.io/name: cognimesh
    app.kubernetes.io/component: ingestion-control
  ports:
    - name: http
      port: 8020
      targetPort: http
