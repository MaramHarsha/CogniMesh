      COGNIMESH_LAKEHOUSE_CONTROL_URL: http://lakehouse-control:8010
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage

