global:
  environment: production
  imagePullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: cognimesh.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          backend:
            service: console
            port: 3000
        - path: /v1/query
          pathType: ImplementationSpecific
          backend:
            service: query-service
            port: 8060
        - path: /v1/registry
          pathType: ImplementationSpecific
          backend:
            service: object-registry
            port: 8000

services:
  # ---------------------------------------------------- Database & Infra
  postgres:
    enabled: true
    port: 5432
    replicaCount: 1
    image:
      repository: postgres
      tag: 16-alpine
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi
      mountPath: /var/lib/postgresql/data
    env:
      POSTGRES_USER: cognimesh
      POSTGRES_PASSWORD: cognimesh-secure-pass
      POSTGRES_DB: cognimesh_registry

  minio:
    enabled: true
    port: 9000
    replicaCount: 1
    image:
      repository: quay.io/minio/minio
      tag: latest
    command: ["server", "/data", "--console-address", ":9001"]
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi
      mountPath: /data
    env:
      MINIO_ROOT_USER: cognimesh
      MINIO_ROOT_PASSWORD: cognimesh-secret

  nessie:
    enabled: true
    port: 19120
    replicaCount: 1
    image:
      repository: ghcr.io/projectnessie/nessie
      tag: 0.107.6
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: false

  mlflow:
    enabled: true
    port: 5000
    replicaCount: 1
    image:
      repository: ghcr.io/mlflow/mlflow
      tag: v2.14.3
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "/var/lib/mlflow/mlruns", "--default-artifact-root", "/var/lib/mlflow/artifacts"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 5Gi
      mountPath: /var/lib/mlflow
    env:
      AWS_ACCESS_KEY_ID: cognimesh
      AWS_SECRET_ACCESS_KEY: cognimesh-secret
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000

  keycloak:
    enabled: true
    port: 8080
    replicaCount: 1
    image:
      repository: quay.io/keycloak/keycloak
      tag: 26.0
    command: ["start-dev"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: false
    env:
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: cognimesh-secure-pass

  # ---------------------------------------------------- CogniMesh Services
  object-registry:
    enabled: true
    port: 8000
    replicaCount: 1
    image:
      repository: cognimesh/object-registry
      tag: 0.1.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: false
    env:
      COGNIMESH_ENV: kubernetes
      COGNIMESH_DATABASE_URL: "postgresql+psycopg://cognimesh:cognimesh-secure-pass@postgres:5432/cognimesh_registry"
      COGNIMESH_ALLOW_DEV_AUTH: "false"

  lakehouse-control:
    enabled: true
    port: 8010
    replicaCount: 1
    image:
      repository: cognimesh/lakehouse-control
      tag: 0.1.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 5Gi
      mountPath: /var/lib/cognimesh/lakehouse-control
    env:
      COGNIMESH_ENV: kubernetes
      COGNIMESH_LAKEHOUSE_STATE_PATH: /var/lib/cognimesh/lakehouse-control/lakehouse.db
      COGNIMESH_LAKEHOUSE_WAREHOUSE_URI: s3://cognimesh-lakehouse/warehouse
      COGNIMESH_S3_ENDPOINT_URL: http://minio:9000
      COGNIMESH_S3_BUCKET: cognimesh-lakehouse
      COGNIMESH_S3_ACCESS_KEY: cognimesh
      COGNIMESH_S3_SECRET_KEY: cognimesh-secret
      COGNIMESH_S3_REGION: us-east-1
      COGNIMESH_NESSIE_URI: http://nessie:19120/api/v2
      COGNIMESH_ICEBERG_REST_URI: http://nessie:19120/iceberg
      COGNIMESH_STORAGE_COST_PER_GB_MONTH: "0.023"

  ingestion-control:
