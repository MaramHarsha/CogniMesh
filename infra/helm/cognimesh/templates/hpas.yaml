apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: object-registry-hpa
  labels:
    {{- include "cognimesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: object-registry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: object-registry
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: query-service-hpa
  labels:
    {{- include "cognimesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: query-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: query-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
