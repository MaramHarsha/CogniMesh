name: cognimesh

services:
  foundation:
    image: alpine:3.20
    profiles:
      - foundation
    command:
      - sh
      - -c
      - "while true; do sleep 3600; done"
    labels:
      org.cognimesh.module: "0"
      org.cognimesh.description: "Placeholder development container for Module 0 foundation checks"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${COGNIMESH_POSTGRES_USER:-cognimesh}
      POSTGRES_PASSWORD: ${COGNIMESH_POSTGRES_PASSWORD:-cognimesh}
      POSTGRES_DB: ${COGNIMESH_POSTGRES_DB:-cognimesh_registry}
    ports:
      - "${COGNIMESH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - cognimesh-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${COGNIMESH_POSTGRES_USER:-cognimesh} -d ${COGNIMESH_POSTGRES_DB:-cognimesh_registry}
      interval: 5s
      timeout: 5s
      retries: 20
    labels:
      org.cognimesh.module: "1"
      org.cognimesh.description: "Object Registry metadata database"

  object-registry:
    build:
      context: ../../services/object-registry
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_DATABASE_URL: postgresql+psycopg://${COGNIMESH_POSTGRES_USER:-cognimesh}:${COGNIMESH_POSTGRES_PASSWORD:-cognimesh}@postgres:5432/${COGNIMESH_POSTGRES_DB:-cognimesh_registry}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_OIDC_ISSUER_URL: ${COGNIMESH_OIDC_ISSUER_URL:-}
      COGNIMESH_OIDC_AUDIENCE: ${COGNIMESH_OIDC_AUDIENCE:-}
      COGNIMESH_OIDC_JWKS_URL: ${COGNIMESH_OIDC_JWKS_URL:-}
    ports:
      - "${COGNIMESH_OBJECT_REGISTRY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      org.cognimesh.module: "1"
      org.cognimesh.description: "Core Data Object Registry API"

  minio:
    image: quay.io/minio/minio:latest
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: ${COGNIMESH_S3_ACCESS_KEY:-cognimesh}
      MINIO_ROOT_PASSWORD: ${COGNIMESH_S3_SECRET_KEY:-cognimesh-secret}
    ports:
      - "${COGNIMESH_MINIO_API_PORT:-9000}:9000"
      - "${COGNIMESH_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - cognimesh-minio-data:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 5s
      timeout: 5s
      retries: 20
    labels:
      org.cognimesh.module: "5"
      org.cognimesh.description: "Local S3-compatible object store for lakehouse data"

  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.6
    ports:
      - "${COGNIMESH_NESSIE_PORT:-19120}:19120"
    labels:
      org.cognimesh.module: "5"
      org.cognimesh.description: "Nessie catalog with Git-like references and Iceberg REST support"

  lakehouse-control:
    build:
      context: ../../services/lakehouse-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_LAKEHOUSE_STATE_PATH: /var/lib/cognimesh/lakehouse-control/lakehouse.db
      COGNIMESH_LAKEHOUSE_WAREHOUSE_URI: s3://${COGNIMESH_S3_BUCKET:-cognimesh-lakehouse}/warehouse
      COGNIMESH_S3_ENDPOINT_URL: http://minio:9000
      COGNIMESH_S3_PUBLIC_ENDPOINT_URL: http://localhost:${COGNIMESH_MINIO_API_PORT:-9000}
      COGNIMESH_S3_BUCKET: ${COGNIMESH_S3_BUCKET:-cognimesh-lakehouse}
      COGNIMESH_S3_ACCESS_KEY: ${COGNIMESH_S3_ACCESS_KEY:-cognimesh}
      COGNIMESH_S3_SECRET_KEY: ${COGNIMESH_S3_SECRET_KEY:-cognimesh-secret}
      COGNIMESH_S3_REGION: ${COGNIMESH_S3_REGION:-us-east-1}
      COGNIMESH_NESSIE_URI: http://nessie:19120/api/v2
      COGNIMESH_ICEBERG_REST_URI: http://nessie:19120/iceberg
      COGNIMESH_STORAGE_COST_PER_GB_MONTH: ${COGNIMESH_STORAGE_COST_PER_GB_MONTH:-0.023}
    ports:
      - "${COGNIMESH_LAKEHOUSE_CONTROL_PORT:-8010}:8010"
    volumes:
      - cognimesh-lakehouse-control-state:/var/lib/cognimesh/lakehouse-control
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_started
    labels:
      org.cognimesh.module: "5"
      org.cognimesh.description: "Lakehouse storage and versioning control API"

  ingestion-control:
    build:
      context: ../../services/ingestion-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_INGESTION_STATE_PATH: /var/lib/cognimesh/ingestion-control/ingestion.db
      COGNIMESH_INGESTION_LOCAL_ROOT: /var/lib/cognimesh/ingestion-control/files
      COGNIMESH_INGESTION_RAW_ROOT: /var/lib/cognimesh/ingestion-control/raw
      COGNIMESH_INGESTION_TARGET_FORMAT: ${COGNIMESH_INGESTION_TARGET_FORMAT:-parquet}
      COGNIMESH_LAKEHOUSE_CONTROL_URL: http://lakehouse-control:8010
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
    ports:
      - "${COGNIMESH_INGESTION_CONTROL_PORT:-8020}:8020"
    volumes:
      - cognimesh-ingestion-control-state:/var/lib/cognimesh/ingestion-control
    depends_on:
      object-registry:
        condition: service_started
      lakehouse-control:
        condition: service_started
    labels:
      org.cognimesh.module: "4"
      org.cognimesh.description: "Data connection, connector registry, ingestion runs, drift, and CDC control API"

  compute-control:
    build:
      context: ../../services/compute-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_COMPUTE_STATE_PATH: /var/lib/cognimesh/compute-control/compute.db
      COGNIMESH_COMPUTE_RESULTS_ROOT: /var/lib/cognimesh/compute-control/results
      COGNIMESH_LAKEHOUSE_CONTROL_URL: http://lakehouse-control:8010
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_INGESTION_CONTROL_URL: http://ingestion-control:8020
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
      COGNIMESH_TRINO_URI: ${COGNIMESH_TRINO_URI:-http://trino:8080}
      COGNIMESH_TRINO_CATALOG: ${COGNIMESH_TRINO_CATALOG:-iceberg}
      COGNIMESH_SPARK_NAMESPACE: ${COGNIMESH_SPARK_NAMESPACE:-cognimesh}
      COGNIMESH_DUCKDB_IMAGE: ${COGNIMESH_DUCKDB_IMAGE:-python:3.12-slim}
      COGNIMESH_SPARK_IMAGE: ${COGNIMESH_SPARK_IMAGE:-apache/spark:3.5.3}
    ports:
      - "${COGNIMESH_COMPUTE_CONTROL_PORT:-8030}:8030"
    volumes:
      - cognimesh-compute-control-state:/var/lib/cognimesh/compute-control
    depends_on:
      lakehouse-control:
        condition: service_started
      ingestion-control:
        condition: service_started
    labels:
      org.cognimesh.module: "6"
      org.cognimesh.description: "Compute engine profiles, local SQL execution, Spark/Trino planning, results, retries, and lineage"

  pipeline-control:
    build:
      context: ../../services/pipeline-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_PIPELINE_STATE_PATH: /var/lib/cognimesh/pipeline-control/pipeline.db
      COGNIMESH_PIPELINE_EXPORT_ROOT: /var/lib/cognimesh/pipeline-control/exports
      COGNIMESH_PIPELINE_ORCHESTRATOR: ${COGNIMESH_PIPELINE_ORCHESTRATOR:-argo}
      COGNIMESH_COMPUTE_CONTROL_URL: http://compute-control:8030
      COGNIMESH_LAKEHOUSE_CONTROL_URL: http://lakehouse-control:8010
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
    ports:
      - "${COGNIMESH_PIPELINE_CONTROL_PORT:-8040}:8040"
    volumes:
      - cognimesh-pipeline-control-state:/var/lib/cognimesh/pipeline-control
    depends_on:
      compute-control:
        condition: service_started
      lakehouse-control:
        condition: service_started
    labels:
      org.cognimesh.module: "7"
      org.cognimesh.description: "Pipeline IR, visual DAG backend, compilers, preview, versions, exports, and lineage"

  semantic-control:
    build:
      context: ../../services/semantic-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_SEMANTIC_STATE_PATH: /var/lib/cognimesh/semantic-control/semantic.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_PIPELINE_CONTROL_URL: http://pipeline-control:8040
      COGNIMESH_COMPUTE_CONTROL_URL: http://compute-control:8030
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
      COGNIMESH_DATAHUB_GMS_URL: ${COGNIMESH_DATAHUB_GMS_URL:-http://datahub-gms:8080}
      COGNIMESH_DATAHUB_ENABLED: ${COGNIMESH_DATAHUB_ENABLED:-false}
    ports:
      - "${COGNIMESH_SEMANTIC_CONTROL_PORT:-8050}:8050"
    volumes:
      - cognimesh-semantic-control-state:/var/lib/cognimesh/semantic-control
    depends_on:
      object-registry:
        condition: service_started
      pipeline-control:
        condition: service_started
    labels:
      org.cognimesh.module: "8"
      org.cognimesh.description: "Semantic modeling, dbt artifact import, data contracts, object mappings, and catalog sync API"

  query-service:
    build:
      context: ../../services/query-service
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_QUERY_STATE_PATH: /var/lib/cognimesh/query-service/query.db
      COGNIMESH_QUERY_DEFAULT_LIMIT: ${COGNIMESH_QUERY_DEFAULT_LIMIT:-100}
      COGNIMESH_QUERY_MAX_LIMIT: ${COGNIMESH_QUERY_MAX_LIMIT:-1000}
      COGNIMESH_QUERY_CACHE_TTL_SECONDS: ${COGNIMESH_QUERY_CACHE_TTL_SECONDS:-300}
      COGNIMESH_TRINO_CATALOG: ${COGNIMESH_TRINO_CATALOG:-iceberg}
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_SEMANTIC_CONTROL_URL: http://semantic-control:8050
      COGNIMESH_COMPUTE_CONTROL_URL: http://compute-control:8030
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
    ports:
      - "${COGNIMESH_QUERY_SERVICE_PORT:-8060}:8060"
    volumes:
      - cognimesh-query-service-state:/var/lib/cognimesh/query-service
    depends_on:
      object-registry:
        condition: service_started
      semantic-control:
        condition: service_started
    labels:
      org.cognimesh.module: "9"
      org.cognimesh.description: "Governed object-set query API with policy rewrite, masking, audit, caching, REST, and GraphQL"

  quality-control:
    build:
      context: ../../services/quality-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_QUALITY_STATE_PATH: /var/lib/cognimesh/quality-control/quality.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_SEMANTIC_CONTROL_URL: http://semantic-control:8050
      COGNIMESH_COMPUTE_CONTROL_URL: http://compute-control:8030
    ports:
      - "${COGNIMESH_QUALITY_CONTROL_PORT:-8070}:8070"
    volumes:
      - cognimesh-quality-control-state:/var/lib/cognimesh/quality-control
    depends_on:
      object-registry:
        condition: service_started
      semantic-control:
        condition: service_started
    labels:
      org.cognimesh.module: "11"
      org.cognimesh.description: "Data Quality And Contracts control plane service"

  action-control:
    build:
      context: ../../services/action-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_ACTION_STATE_PATH: /var/lib/cognimesh/action-control/action.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_QUERY_SERVICE_URL: http://query-service:8060
    ports:
      - "${COGNIMESH_ACTION_CONTROL_PORT:-8080}:8080"
    volumes:
      - cognimesh-action-control-state:/var/lib/cognimesh/action-control
    depends_on:
      object-registry:
        condition: service_started
      query-service:
        condition: service_started
    labels:
      org.cognimesh.module: "12"
      org.cognimesh.description: "Actions, Writeback, And Functions control plane service"

  app-control:
    build:
      context: ../../services/app-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_APP_STATE_PATH: /var/lib/cognimesh/app-control/app.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_QUERY_SERVICE_URL: http://query-service:8060
    ports:
      - "${COGNIMESH_APP_CONTROL_PORT:-8090}:8090"
    volumes:
      - cognimesh-app-control-state:/var/lib/cognimesh/app-control
    depends_on:
      object-registry:
        condition: service_started
      query-service:
        condition: service_started
    labels:
      org.cognimesh.module: "13"
      org.cognimesh.description: "Low-Code App Registry Control Plane API"

  console:
    build:
      context: ../../apps/console
    ports:
      - "${COGNIMESH_CONSOLE_PORT:-3000}:3000"
    volumes:
      - ../../apps/console/src:/app/src
    depends_on:
      object-registry:
        condition: service_started
      query-service:
        condition: service_started
    labels:
      org.cognimesh.module: "14"
      org.cognimesh.description: "CogniMesh Native UI Console"

  ml-control:
    build:
      context: ../../services/ml-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_ML_STATE_PATH: /var/lib/cognimesh/ml-control/ml.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_QUERY_SERVICE_URL: http://query-service:8060
      COGNIMESH_MLFLOW_TRACKING_URI: ${COGNIMESH_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      COGNIMESH_MLFLOW_ENABLED: ${COGNIMESH_MLFLOW_ENABLED:-false}
    ports:
      - "${COGNIMESH_ML_CONTROL_PORT:-8100}:8100"
    volumes:
      - cognimesh-ml-control-state:/var/lib/cognimesh/ml-control
    depends_on:
      object-registry:
        condition: service_started
      query-service:
        condition: service_started
    labels:
      org.cognimesh.module: "15"
      org.cognimesh.description: "ML And Model Lifecycle control plane (experiments, runs, registry, serving, drift, retraining)"

  planning-control:
    build:
      context: ../../services/planning-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_PLANNING_STATE_PATH: /var/lib/cognimesh/planning-control/planning.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_QUERY_SERVICE_URL: http://query-service:8060
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
    ports:
      - "${COGNIMESH_PLANNING_CONTROL_PORT:-8110}:8110"
    volumes:
      - cognimesh-planning-control-state:/var/lib/cognimesh/planning-control
    depends_on:
      object-registry:
        condition: service_started
      query-service:
        condition: service_started
    labels:
      org.cognimesh.module: "16"
      org.cognimesh.description: "Planning, Optimization, and AI Tooling control plane (scenarios, simulations, optimizations, agent tools, sessions, evaluations)"

  governance-control:
    build:
      context: ../../services/governance-control
    environment:
      COGNIMESH_ENV: ${COGNIMESH_ENV:-local}
      COGNIMESH_LOG_LEVEL: ${COGNIMESH_LOG_LEVEL:-INFO}
      COGNIMESH_ALLOW_DEV_AUTH: ${COGNIMESH_ALLOW_DEV_AUTH:-true}
      COGNIMESH_GOVERNANCE_STATE_PATH: /var/lib/cognimesh/governance-control/governance.db
      COGNIMESH_OBJECT_REGISTRY_URL: http://object-registry:8000
      COGNIMESH_QUERY_SERVICE_URL: http://query-service:8060
      COGNIMESH_LINEAGE_ENDPOINT_URL: http://object-registry:8000/v1/lineage/openlineage
    ports:
      - "${COGNIMESH_GOVERNANCE_CONTROL_PORT:-8120}:8120"
    volumes:
      - cognimesh-governance-control-state:/var/lib/cognimesh/governance-control
    depends_on:
      object-registry:
        condition: service_started
      query-service:
        condition: service_started
    labels:
      org.cognimesh.module: "17"
      org.cognimesh.description: "Advanced Governance and Compliance control plane (classifications, purpose propagation, simulation, masking, row-filters, evidence, retention, legal holds)"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    profiles:
      - mlflow
    command:
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - /var/lib/mlflow/mlruns
      - --default-artifact-root
      - /var/lib/mlflow/artifacts
    ports:
      - "${COGNIMESH_MLFLOW_PORT:-5000}:5000"
    volumes:
      - cognimesh-mlflow-data:/var/lib/mlflow
    labels:
      org.cognimesh.module: "15"
      org.cognimesh.description: "Optional MLflow tracking server (enable with --profile mlflow)"

  neo4j:
    image: neo4j:5-community
    profiles:
      - graph
    environment:
      NEO4J_AUTH: ${COGNIMESH_NEO4J_AUTH:-neo4j/cognimesh}
    ports:
      - "${COGNIMESH_NEO4J_HTTP_PORT:-7474}:7474"
      - "${COGNIMESH_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - cognimesh-neo4j-data:/data
    labels:
      org.cognimesh.module: "1"
      org.cognimesh.description: "Optional graph backend profile"

  adminer:
    image: adminer:4
    profiles:
      - tools
    ports:
      - "${COGNIMESH_ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    labels:
      org.cognimesh.module: "1"
      org.cognimesh.description: "Optional database browser"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles:
      - identity
    command:
      - start-dev
    environment:
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${COGNIMESH_KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${COGNIMESH_KEYCLOAK_ADMIN_PASSWORD:-cognimesh}
    ports:
      - "${COGNIMESH_KEYCLOAK_PORT:-8081}:8080"
    labels:
      org.cognimesh.module: "2"
      org.cognimesh.description: "Optional Keycloak OIDC provider for local identity testing"

volumes:
  cognimesh-postgres-data:
  cognimesh-neo4j-data:
  cognimesh-minio-data:
  cognimesh-lakehouse-control-state:
  cognimesh-ingestion-control-state:
  cognimesh-compute-control-state:
  cognimesh-pipeline-control-state:
  cognimesh-semantic-control-state:
  cognimesh-query-service-state:
  cognimesh-quality-control-state:
  cognimesh-action-control-state:
  cognimesh-app-control-state:
  cognimesh-ml-control-state:
  cognimesh-planning-control-state:
  cognimesh-governance-control-state:
  cognimesh-mlflow-data:
